            - generic [ref=e199]: expand_more
          - generic [ref=e200]: Yes. Our AI is built for natural, human-like conversations. It understands context, responds smoothly, and can handle interruptions or more complex questions without sounding robotic. In most cases, callers don't realize they're speaking with an AI receptionist.
        - generic [ref=e201]:
          - button "How long does setup take? expand_more" [ref=e202] [cursor=pointer]:
            - generic [ref=e203]: How long does setup take?
            - generic [ref=e204]: expand_more
          - generic [ref=e205]: Setup is completed in 7 days. You simply forward your calls to our number, we configure the AI using your business details, services and booking preferences. No technical knowledge required, no hardware to install and no downtime.
        - generic [ref=e206]:
          - button "Is it a Done-For-You Service? expand_more" [ref=e207] [cursor=pointer]:
            - generic [ref=e208]: Is it a Done-For-You Service?
            - generic [ref=e209]: expand_more
          - generic [ref=e210]: Yes. An expert will create a custom AI for you, ensuring high conversion rates and setup in under 7 days.
        - generic [ref=e211]:
          - button "Does it integrate with my existing CRM? expand_more" [ref=e212] [cursor=pointer]:
            - generic [ref=e213]: Does it integrate with my existing CRM?
            - generic [ref=e214]: expand_more
          - generic [ref=e215]: All call data and leads are automatically synced to your existing systems. The AI qualifies leads in real time, generates call transcripts, and keeps contact records up to date — your team always has full context without manual work.
        - generic [ref=e216]:
          - button "Can it work for my industry? expand_more" [ref=e217] [cursor=pointer]:
            - generic [ref=e218]: Can it work for my industry?
            - generic [ref=e219]: expand_more
          - generic [ref=e220]: Yes. We tailor the AI to your specific niche, terminology, typical customer questions, and the workflows your team actually uses. Whether you run a plumbing business, a salon, or a fitness studio, it's trained to speak your business language.
        - generic [ref=e221]:
          - button "Can it actually book appointments and take payments? expand_more" [ref=e222] [cursor=pointer]:
            - generic [ref=e223]: Can it actually book appointments and take payments?
            - generic [ref=e224]: expand_more
          - generic [ref=e225]: Yes. The AI connects to your calendar to book appointments in real time, checking availability, confirming details, and sending confirmations automatically. For payments, it can securely collect and process transactions through your existing payment provider.
        - generic [ref=e226]:
          - button "What happens if the AI can't handle a call? expand_more" [ref=e227] [cursor=pointer]:
            - generic [ref=e228]: What happens if the AI can't handle a call?
            - generic [ref=e229]: expand_more
          - generic [ref=e230]: If a conversation requires a human touch, the AI detects it immediately and can transfer the call to your chosen number or capture a detailed message with all relevant context. Over time it learns from these situations to handle similar cases more effectively.
        - generic [ref=e231]:
